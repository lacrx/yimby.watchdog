# Agency registry — one entry per monitored body.
# Pipeline, scrapers, and transforms read this to discover agencies dynamically.
#
# Platform types:
#   legistar_html   — Legistar Calendar.aspx HTML scraping
#   legistar_odata  — Legistar OData REST API (webapi.legistar.com)
#   escribe         — eScribe JSON API
#   granicus        — Granicus Publisher RSS + AgendaViewer
#   civicplus       — CivicPlus AgendaCenter HTML
#   civicclerk      — CivicClerk OData API (Events endpoint)
#   carlsbad_cms    — CivicPlus CMS folders behind Akamai WAF (curl only)
#   solana_drupal   — Drupal Views + eScribe dual-source
#   coastal_api     — CA Coastal Commission JSON API
#   custom_html     — Custom HTML scraping (one-off sites)
#
# lookback_months: overrides pipeline --years for this agency.
#   Omit for full historical lookback (Oceanside).
#   Set to 2-3 for forward-only monitoring of new cities.

agencies:

  # ── North County Coastal ──────────────────────────────────────────

  oceanside:
    name: City of Oceanside
    region: north_county_coastal
    platform: legistar_html
    base_url: https://oceanside.legistar.com
    bodies:
      - City Council
      - Planning Commission
      - Housing Commission
      - Manufactured Home Fair Practices Commission
      - Downtown Advisory Committee
      - Historic Preservation Advisory Commission
      - Economic Development Commission
      - Utilities Commission
      - Harbor and Beaches Advisory Committee
      - Citizen Investment Oversight Committee
      - Measure X Citizen Oversight Committee
    deep_fetch: true
    permits:
      platform: etrakit
      base_url: https://etrakit.cityofoceanside.com/etrakit3
    enabled: true

  carlsbad:
    name: City of Carlsbad
    region: north_county_coastal
    platform: carlsbad_cms
    base_url: https://www.carlsbadca.gov
    lookback_months: 2
    bodies:
      - City Council
      - Planning Commission
      - Housing Commission
      - Arts Commission
      - Historic Preservation Commission
      - Environmental Sustainability Commission
      - Parks & Recreation Commission
      - Library Board of Trustees
      - Senior Commission
      - Traffic Safety & Mobility Commission
      - Community-Police Engagement Commission
    body_pages:
      City Council: /city-hall/meetings-agendas
      Planning Commission: /city-hall/meetings-agendas/boards-commissions/planning-commission
      Housing Commission: /city-hall/meetings-agendas/boards-commissions/housing-commission
      Arts Commission: /city-hall/meetings-agendas/boards-commissions/arts-commission
      Historic Preservation Commission: /city-hall/meetings-agendas/boards-commissions/historic-preservation
      Environmental Sustainability Commission: /city-hall/meetings-agendas/boards-commissions/environmental-sustainability-commission
      Parks & Recreation Commission: /city-hall/meetings-agendas/boards-commissions/parks-recreation
      Library Board of Trustees: /city-hall/meetings-agendas/boards-commissions/library-board-of-trustees
      Senior Commission: /city-hall/meetings-agendas/boards-commissions/senior-commission
      Traffic Safety & Mobility Commission: /city-hall/meetings-agendas/boards-commissions/traffic-mobility-commission
      Community-Police Engagement Commission: /city-hall/meetings-agendas/boards-commissions/community-police-engagement-commission
    deep_fetch: false
    enabled: true
    forward_only: true
    enabled_date: "2026-07-13"

  encinitas:
    name: City of Encinitas
    region: north_county_coastal
    platform: granicus
    base_url: https://encinitas.granicus.com
    view_id: 7
    lookback_months: 2
    bodies: []  # all bodies in view
    deep_fetch: false
    enabled: true
    forward_only: true
    enabled_date: "2026-07-13"

  solana_beach:
    name: City of Solana Beach
    region: north_county_coastal
    platform: solana_drupal
    base_url: https://cityofsolanabeach.ca.gov
    escribe_base: https://pub-solanabeach.escribemeetings.com
    lookback_months: 2
    bodies:
      - City Council
      - Budget & Finance
      - School Relations Committee
      - Climate & Resiliency
      - Parks and Recreation Commission
      - Public Arts Advisory Commission
    escribe_bodies:
      - Council Meetings REGULAR
      - Closed Session
    drupal_pages:
      council:
        path: /en/city-council-meetings
        body_prefix: City Council
      commissions:
        path: /en/government/public-meetings/citizen-commission-council-standing-committee-meetings
        body_prefix: null
    deep_fetch: false
    enabled: true
    forward_only: true
    enabled_date: "2026-07-13"

  del_mar:
    name: City of Del Mar
    region: north_county_coastal
